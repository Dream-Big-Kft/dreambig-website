name: Build on main

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dreamBig-next/package-lock.json

      - name: Install dependencies
        working-directory: dreamBig-next
        run: npm ci

      - name: Run production build
        working-directory: dreamBig-next
        env:
          GITHUB_PAGES_REPO: ${{ github.event.repository.name }}
        run: npm run build
