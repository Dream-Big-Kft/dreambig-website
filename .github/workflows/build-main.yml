# Workflow name shown in the GitHub Actions UI.
name: Build and deploy to GitHub Pages

# Run automatically when code lands on main, and allow manual runs from the UI.
on:
  push:
    branches:
      - main
  workflow_dispatch:

# Minimum permissions needed to read the repo and publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent overlapping Pages deploys and keep only the newest run active.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Build the static site and upload it as a Pages artifact.
  build:
    # Use GitHub's Ubuntu runner for the CI job.
    runs-on: ubuntu-latest

    steps:
      # Pull the repository code into the runner.
      - name: Check out repository
        uses: actions/checkout@v5

      # Install the pnpm CLI so the runner can use the same package manager as local development.
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json

      # Install Node.js and enable pnpm dependency caching.
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          # Match the Node version declared for local development.
          node-version-file: .node-version
          # Reuse downloaded pnpm packages between workflow runs.
          cache: pnpm
          # Point cache lookup to the repo-root lockfile.
          cache-dependency-path: pnpm-lock.yaml

      # Install exact dependencies from pnpm-lock.yaml using the same package manager as local development.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Audit dependencies and fail the build only on critical vulnerabilities.
      - name: Run dependency audit
        id: dependency_audit
        run: pnpm dlx audit-ci@^7 --config ./audit-ci.jsonc | tee audit-summary.txt

      # Upload the short audit summary when the audit command completed successfully.
      - name: Upload audit summary
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-summary
          path: audit-summary.txt

      # Build the Next.js app for the custom domain root.
      - name: Run production build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_FORMSPREE_ENDPOINT: https://formspree.io/f/mvzlabpp
        run: pnpm build

      # Run the test suite after the production build; any failing test stops deployment.
      - name: Run tests
        run: pnpm test

      # Prepare the runner for a GitHub Pages deployment.
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      # Upload the generated static site from Next's export output folder.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  # Deploy the uploaded artifact to the GitHub Pages environment.
  deploy:
    # Wait for the build job to finish successfully before deploying.
    needs: build
    runs-on: ubuntu-latest
    environment:
      # Attach this job to the special GitHub Pages environment.
      name: github-pages
      # Show the deployed site URL in the workflow UI.
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Publish the uploaded artifact to GitHub Pages.
      - name: Deploy to GitHub Pages
        # Give this step an id so we can read its outputs, like page_url.
        id: deployment
        uses: actions/deploy-pages@v4
