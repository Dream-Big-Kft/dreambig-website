version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm@10.15.0
        - pnpm install --frozen-lockfile
        - pnpm dlx audit-ci@^7 --config ./audit-ci.jsonc || true
    test:
      commands:
        - pnpm test
    build:
      commands:
        - pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - .next/cache/**/*
      - node_modules/**/*